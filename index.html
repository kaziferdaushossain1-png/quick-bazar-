<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>কুইক বাজার - প্রিমিয়াম স্যানিটারি শপ</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; background-color: #f1f2f6; text-align: center; color: #2d3436; }
        
        /* চলন্ত লোগো ও হেডার */
        header { background: linear-gradient(90deg, #d63031, #ef5757); color: white; padding: 25px 0; position: sticky; top: 0; z-index: 1000; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .moving-text { font-size: 26px; font-weight: bold; white-space: nowrap; }
        .voice-alert { font-size: 14px; color: #fbff00; display: block; margin-top: 10px; font-weight: bold; animation: heartbeat 1.5s infinite; }
        
        @keyframes heartbeat { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }

        .container { max-width: 950px; margin: auto; padding: 20px; }
        .product-grid { display: grid; grid-template-columns: 1fr; gap: 25px; }
        @media (min-width: 650px) { .product-grid { grid-template-columns: 1fr 1fr; } }

        /* প্রোডাক্ট কার্ড */
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border: 1px solid #e1e4e8; position: relative; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .discount-badge { position: absolute; top: 15px; left: 15px; background: #00b894; color: white; padding: 6px 12px; border-radius: 10px; font-size: 14px; font-weight: bold; z-index: 5; }
        
        .card img { width: 100%; border-radius: 15px; height: 200px; object-fit: cover; background: #f9f9f9; }
        .name { font-size: 20px; font-weight: bold; margin: 15px 0 5px; color: #2d3436; }
        .price-tag { margin: 10px 0; }
        .old-price { color: #b2bec3; text-decoration: line-through; font-size: 16px; margin-right: 10px; }
        .new-price { color: #d63031; font-size: 26px; font-weight: bold; }
        
        /* বাটন স্টাইল */
        .btn { display: block; width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; border: none; margin-top: 10px; }
        .voice-btn { background: #6c5ce7; color: white; box-shadow: 0 4px 0 #4834d4; }
        .wa-btn { background: #25D366; color: white; text-decoration: none; box-shadow: 0 4px 0 #1e9e4d; }
        
        footer { padding: 50px; background: #2d3436; color: white; margin-top: 50px; }
    </style>
</head>
<body>

<header onclick="announceOffer()">
    <marquee class="moving-text" behavior="scroll" direction="left" scrollamount="9">
        🔥 কুইক বাজার মেগা সেল — সব স্যানিটারি ফিটিংস এ সরাসরি ২০% ছাড় — প্রিমিয়াম কোয়ালিটি সুলভ মূল্যে — অফার সীমিত সময়ের জন্য 🔥
    </marquee>
    <span class="voice-alert">🔊 বিস্তারিত অফার শুনতে এখানে ক্লিক করুন</span>
</header>

<div class="container">
    <div class="product-grid" id="main-shop"></div>
</div>

<footer>
    <p>&copy; ২০২৬ কুইক বাজার | কাস্টমার সন্তুষ্টি আমাদের লক্ষ্য</p>
</footer>

<script>
    // হেডারের বিস্তারিত অডিও বিজ্ঞাপন
    function announceOffer() {
        window.speechSynthesis.cancel();
        const msg = "আসসালামু আলাইকুম, কুইক বাজার স্যানিটারি স্টোর থেকে আপনাদের জানাচ্ছি স্বাগতম। আপনি কি সুলভ মূল্যে আপনার বাথরুমের জন্য প্রিমিয়াম ফিটিংস খুঁজছেন? তাহলে আজকের অফারটি আপনার জন্য! আমাদের এখানে পাবেন উন্নত মানের ম্যাজিক কল, সিরামিক বেসিন, স্মার্ট কমোডসহ সকল স্যানিটারি আইটেম। আর বিশেষ খবর হলো, প্রতিটি পণ্যের ওপর আমরা দিচ্ছি সরাসরি ২০ শতাংশ ক্যাশ ডিসকাউন্ট। বাজারের সবথেকে সাশ্রয়ী মূল্যে সেরা মাল নিতে এখনই আমাদের পণ্যগুলো দেখুন। বিস্তারিত জানতে যেকোনো মালের নিচের বিবরণ শুনুন বাটনে ক্লিক করুন। ধন্যবাদ!";
        const speech = new SpeechSynthesisUtterance(msg);
        speech.lang = 'bn-BD';
        speech.rate = 0.95;
        window.speechSynthesis.speak(speech);
    }

    // ১০টি স্যানিটারি আইটেম ডাটা
    const products = [
        {name: "ম্যাজিক কল (Stainless Steel)", img: "https://picsum.photos/400/400?random=11", price: 850, desc: "এটি একটি এসএস ম্যাটেরিয়ালের মরিচারোধী কল। যা বছরের পর বছর নতুনের মতো সেবা দেবে।"},
        {name: "সিরামিক বেসিন (Royal White)", img: "https://picsum.photos/400/400?random=12", price: 4500, desc: "উন্নত মানের জাপানিজ প্রযুক্তিতে তৈরি এই বেসিনটি দেখতে যেমন সুন্দর, তেমনি টেকসই।"},
        {name: "স্মার্ট কমোড (Luxury)", img: "https://picsum.photos/400/400?random=13", price: 12000, desc: "অটো ফ্লাশ এবং অ্যান্টি ব্যাকটেরিয়াল কোটিং সমৃদ্ধ আধুনিক কমোড।"},
        {name: "হাই-প্রেসার শাওয়ার সেট", img: "https://picsum.photos/400/400?random=14", price: 1200, desc: "আরামদায়ক গোসলের নিশ্চয়তা দিতে এই শাওয়ারটি সেরা পছন্দ।"},
        {name: "মজবুত পিভিসি বিবি কক", img: "https://picsum.photos/400/400?random=15", price: 150, desc: "অল্প দামে সেরা সার্ভিস। লিক হওয়ার কোনো ভয় নেই।"},
        {name: "কিচেন ডাবল সিঙ্ক", img: "https://picsum.photos/400/400?random=16", price: 3500, desc: "আপনার রান্নাঘরকে আধুনিক করতে এই স্টিল সিঙ্কটি ব্যবহার করুন।"},
        {name: "ফ্লেক্সিবল হ্যান্ড শাওয়ার", img: "https://picsum.photos/400/400?random=17", price: 950, desc: "সব ধরণের বাথরুমে সহজেই সেট করা যায়।"},
        {name: "ভারী ব্রাশ স্টপ কক", img: "https://picsum.photos/400/400?random=18", price: 450, desc: "খাঁটি তামা ও ব্রাশের সমন্বয়ে তৈরি প্রিমিয়াম কল।"},
        {name: "বেসিন মিক্সার (Hot & Cold)", img: "https://picsum.photos/400/400?random=19", price: 2800, desc: "একই কলে গরম ও ঠান্ডা পানি কন্ট্রোল করার আধুনিক সুবিধা।"},
        {name: "অ্যান্টি-স্মেল ড্রেন ট্র্যাপ", img: "https://picsum.photos/400/400?random=20", price: 300, desc: "বাথরুমের দুর্গন্ধ এবং পোকা মাকড় আসা চিরতরে বন্ধ করবে।"}
    ];

    const shop = document.getElementById('main-shop');

    // প্রোডাক্টের আলাদা বিবরণ ভয়েস
    function speakProduct(name, price, final, desc) {
        window.speechSynthesis.cancel();
        const text = `পণ্যের নাম: ${name}। এর নিয়মিত মূল্য ${price} টাকা। ২০ শতাংশ ছাড়ে এখন পাচ্ছেন মাত্র ${final} টাকায়। বিবরণ: ${desc}`;
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = 'bn-BD';
        window.speechSynthesis.speak(speech);
    }

    products.forEach((p, index) => {
        let finalP = Math.floor(p.price * 0.8);
        shop.innerHTML += `
            <div class="card">
                <div class="discount-badge">২০% সরাসরি ছাড়</div>
                <img src="${p.img}" alt="${p.name}">
                <div class="name">${p.name}</div>
                <div class="price-tag">
                    <span class="old-price">৳${p.price}</span>
                    <span class="new-price">৳${finalP}</span>
                </div>
                <button class="btn voice-btn" onclick="speakProduct('${p.name}', ${p.price}, ${finalP}, '${p.desc}')">🔊 বিবরণ ও অফার শুনুন</button>
                <a href="https://wa.me/8801700000000" class="btn wa-btn">হোয়াটসঅ্যাপে অর্ডার করুন</a>
            </div>
        `;
    });
</script>

</body>
</html>
